# projects/pianika.yml

project_name: pianika
train_set: train
val_set: valid
num_gpus: 1

# Anchor settings (Default EfficientDet)
anchors_scales: '[2 ** 0, 2 ** (1.0 / 3.0), 2 ** (2.0 / 3.0)]'
anchors_ratios: '[(1.0, 1.0), (1.4, 0.7), (0.7, 1.4)]'

# Image Stats (ImageNet Mean/Std)
mean: [0.485, 0.456, 0.406]
std: [0.229, 0.224, 0.225]

# --- DAFTAR KELAS (PENTING) ---
# Urutan ini harus SAMA PERSIS dengan ID di JSON Anda.
# ID 1 = label, ID 2 = pianika_biru, dst...
obj_list: [
  'label',          # ID 1
  'pianika_biru',   # ID 2
  'hose',           # ID 3
  'mouthpiece',     # ID 4
  'case_biru',      # ID 5
  'leaflet',        # ID 6
  'buku_manual',    # ID 7
  'case_pink',      # ID 8
  'pianika_pink'    # ID 9
]